<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrossel iMah - Inspirado em M&R</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .carousel-item img {
      width: 100%;
      height: auto;
      max-height: 600px; /* Altura máxima no desktop */
      object-fit: cover; /* Garante que a imagem cubra o espaço */
    }
    .carousel-caption {
      background: rgba(0, 0, 0, 0.5); /* Fundo semitransparente */
      padding: 15px;
      border-radius: 5px;
    }
    .carousel-caption h5 {
      font-size: 2rem;
      font-weight: bold;
    }
    .carousel-caption p {
      font-size: 1.2rem;
    }
    .carousel-caption .btn {
      margin-top: 10px;
    }
    @media (max-width: 768px) {
      .carousel-item img {
        max-height: 300px; /* Altura reduzida para mobile */
      }
      .carousel-caption h5 {
        font-size: 1.2rem; /* Texto menor em mobile */
      }
      .carousel-caption p {
        font-size: 0.9rem;
      }
      .carousel-caption .btn {
        font-size: 0.8rem;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Carrossel -->
  <div id="carouselIMah" class="carousel slide" data-bs-ride="carousel">
    <!-- Indicadores -->
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#carouselIMah" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
      <button type="button" data-bs-target="#carouselIMah" data-bs-slide-to="1" aria-label="Slide 2"></button>
      <button type="button" data-bs-target="#carouselIMah" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>
    <!-- Itens do Carrossel -->
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="https://via.placeholder.com/1440x600?text=Impressora+iMah" class="d-block w-100" alt="Impressora iMah">
        <div class="carousel-caption">
          <h5>Impressoras de Alta Performance</h5>
          <p>Soluções inovadoras para impressão serigráfica.</p>
          <a href="#saiba-mais" class="btn btn-primary">Saiba Mais</a>
        </div>
      </div>
      <div class="carousel-item">
        <img src="https://via.placeholder.com/1440x600?text=Envernizadora+iMah" class="d-block w-100" alt="Envernizadora iMah">
        <div class="carousel-caption">
          <h5>Envernizadoras de Precisão</h5>
          <p>Acabamentos perfeitos com tecnologia iMah.</p>
          <a href="#ver-tecnologia" class="btn btn-primary">Ver Tecnologia</a>
        </div>
      </div>
      <div class="carousel-item">
        <img src="https://via.placeholder.com/1440x600?text=Soluções+iMah" class="d-block w-100" alt="Soluções iMah">
        <div class="carousel-caption">
          <h5>Soluções Completas para Impressão</h5>
          <p>Equipamentos e suporte para sua produção.</p>
          <a href="#cotacao" class="btn btn-primary">Solicitar Cotação</a>
        </div>
      </div>
    </div>
    <!-- Controles -->
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselIMah" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Anterior</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselIMah" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Próximo</span>
    </button>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
